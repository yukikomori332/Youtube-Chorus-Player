services:
  setup:
    profiles:
      - setup
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - .:/app
    command: sh -c "npx create-next-app@latest front"
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./front:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev"

volumes:
  node_modules:
